name: CI/CD Pipeline with Auto Rollback

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

env:
  IMAGE_NAME: cicd-demo
  CONTAINER_NAME: cicd-demo-app
  APP_PORT: 3000

jobs:

  # =========================================================
  # JOB 1 — TEST
  # =========================================================
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run tests with coverage
        working-directory: app
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/coverage/

  # =========================================================
  # JOB 2 — BUILD + PUSH IMAGE
  # =========================================================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    needs: test

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          TAG="${GITHUB_SHA:0:8}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Verified tag: ${TAG}"
          cat "$GITHUB_OUTPUT"

      - name: Verify tag output
        run: echo "Tag from output = ${{ steps.tag.outputs.tag }}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  # =========================================================
  # JOB 3 — DEPLOY + AUTO ROLLBACK
  # =========================================================
  deploy:
    name: Deploy to EC2 + Auto Rollback
    runs-on: ubuntu-latest

    needs: build

    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy deployment scripts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "scripts/"
          target: "/home/${{ secrets.EC2_USER }}/cicd-demo"

      - name: Deploy application on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,DOCKERHUB_USERNAME,IMAGE_NAME,CONTAINER_NAME,APP_PORT
          script: |
            set -e

            cd /home/ubuntu/cicd-demo

            chmod +x scripts/deploy_ec2.sh
            chmod +x scripts/health_check.sh

            FULL_IMAGE="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${IMAGE_TAG}"

            echo "Image tag : ${IMAGE_TAG}"
            echo "Full image: ${FULL_IMAGE}"

            bash scripts/deploy_ec2.sh \
              "${FULL_IMAGE}" \
              "${IMAGE_TAG}" \
              "${CONTAINER_NAME}" \
              "${APP_PORT}"

      - name: Deployment success notification
        if: success()
        run: |
          echo "::notice::Deployment successful! Version: ${{ needs.build.outputs.image_tag }}"

      - name: Deployment failed notification
        if: failure()
        run: |
          echo "::error::Deployment failed — auto rollback executed on EC2."
